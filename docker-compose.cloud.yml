# ============================================================
# Market Data Reliability Platform — Cloud Compose Override
# ============================================================
#
# Differences from docker-compose.yml (simulated mode):
#   - MinIO removed  → Bronze storage uses real AWS S3
#   - No hardcoded AWS credentials  → EC2 instance IAM role provides them
#   - Databento live adapter active when DATABENTO_API_KEY is set
#   - Silver/Gold loaders write to real Snowflake
#
# Prerequisites (run once before `docker compose up`):
#   1. bash infra/deploy-ec2.sh          — launches EC2 and generates .env
#   2. OR: manually set .env with values from Secrets Manager
#
# Usage:
#   docker compose -f docker-compose.cloud.yml up -d
#   docker compose -f docker-compose.cloud.yml logs -f
# ============================================================

networks:
  mdrp-network:
    driver: bridge

volumes:
  redis-data:
  grafana-data:

# ============================================================
# INFRASTRUCTURE SERVICES
# ============================================================
services:

  # ----------------------------------------------------------
  # Redpanda (Kafka-compatible broker, KRaft mode)
  # ----------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda
    hostname: redpanda
    networks:
      - mdrp-network
    ports:
      - "9092:9092"
      - "9644:9644"
      - "8081:8081"
      - "9645:9645"
    command:
      - redpanda
      - start
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr redpanda:9092
      - --pandaproxy-addr 0.0.0.0:9645
      - --advertise-pandaproxy-addr redpanda:9645
      - --schema-registry-addr 0.0.0.0:8081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redpanda topic initialisation (one-shot)
  # ----------------------------------------------------------
  redpanda-init:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda-init
    networks:
      - mdrp-network
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Creating Kafka topics..."
        rpk topic create market.events.raw        --brokers redpanda:9092 --partitions 6 --replicas 1 || true
        rpk topic create market.events.validated  --brokers redpanda:9092 --partitions 6 --replicas 1 || true
        rpk topic create market.events.normalized --brokers redpanda:9092 --partitions 6 --replicas 1 || true
        rpk topic create market.events.replay     --brokers redpanda:9092 --partitions 3 --replicas 1 || true
        rpk topic create market.events.dlq        --brokers redpanda:9092 --partitions 3 --replicas 1 || true
        echo "Topics created."
        rpk topic list --brokers redpanda:9092
    restart: "no"

  # ----------------------------------------------------------
  # Redis
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    networks:
      - mdrp-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis Exporter
  # ----------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    hostname: redis-exporter
    networks:
      - mdrp-network
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    restart: unless-stopped

  # ----------------------------------------------------------
  # Prometheus
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    hostname: prometheus
    networks:
      - mdrp-network
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts:/etc/prometheus/alerts:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
      - "--log.level=info"
    restart: unless-stopped

  # ----------------------------------------------------------
  # Grafana
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    hostname: grafana
    networks:
      - mdrp-network
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-mdrp_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    restart: unless-stopped

  # ----------------------------------------------------------
  # AlertManager
  # ----------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    hostname: alertmanager
    networks:
      - mdrp-network
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--log.level=info"
    restart: unless-stopped

  # ----------------------------------------------------------
  # Jaeger (distributed tracing)
  # ----------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    hostname: jaeger
    networks:
      - mdrp-network
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "50000"
    restart: unless-stopped

  # ============================================================
  # APPLICATION SERVICES
  # S3_ENDPOINT_URL is intentionally absent — the SDK defaults
  # to real AWS S3.  AWS credentials come from the EC2 instance
  # IAM role (instance metadata) or from .env if running locally.
  # ============================================================

  # ----------------------------------------------------------
  # Provider Emulator — synthetic fault-injected curves
  # ----------------------------------------------------------
  provider-emulator:
    build:
      context: .
      dockerfile: services/provider-emulator/Dockerfile
    container_name: provider-emulator
    hostname: provider-emulator
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "8001"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: provider-emulator
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Validation Service
  # ----------------------------------------------------------
  validation-service:
    build:
      context: .
      dockerfile: services/validation-service/Dockerfile
    container_name: validation-service
    hostname: validation-service
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "8002"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: validation-service
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Bronze Writer — persists raw events to S3
  # ----------------------------------------------------------
  bronze-writer:
    build:
      context: .
      dockerfile: services/bronze-writer/Dockerfile
    container_name: bronze-writer
    hostname: bronze-writer
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "8003"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: bronze-writer
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Normalization Service
  # ----------------------------------------------------------
  normalization-service:
    build:
      context: .
      dockerfile: services/normalization-service/Dockerfile
    container_name: normalization-service
    hostname: normalization-service
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "8004"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: normalization-service
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/metrics')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis Writer — pushes normalized data to Redis hot cache
  # ----------------------------------------------------------
  redis-writer:
    build:
      context: .
      dockerfile: services/redis-writer/Dockerfile
    container_name: redis-writer
    hostname: redis-writer
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "8005"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: redis-writer
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/metrics')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Replay Engine — replays historical data on demand
  # ----------------------------------------------------------
  replay-engine:
    build:
      context: .
      dockerfile: services/replay-engine/Dockerfile
    container_name: replay-engine
    hostname: replay-engine
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "8006"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: replay-engine
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/metrics')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Ops API — REST API for operations, alert routing
  # ----------------------------------------------------------
  ops-api:
    build:
      context: .
      dockerfile: services/ops-api/Dockerfile
    container_name: ops-api
    hostname: ops-api
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "8007"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: ops-api
    ports:
      - "8000:8080"
      - "8007:8007"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Silver Loader — buffers CurveEvents and loads to Snowflake
  # ----------------------------------------------------------
  silver-loader:
    build:
      context: .
      dockerfile: services/silver-loader/Dockerfile
    container_name: silver-loader
    hostname: silver-loader
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      METRICS_PORT: "8008"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: silver-loader
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/metrics')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Gold Loader — assembles snapshots and loads to Snowflake Gold
  # ----------------------------------------------------------
  gold-loader:
    build:
      context: .
      dockerfile: services/gold-loader/Dockerfile
    container_name: gold-loader
    hostname: gold-loader
    networks:
      - mdrp-network
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      METRICS_PORT: "8009"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: gold-loader
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/metrics')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
