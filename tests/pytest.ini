[pytest]
# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
testpaths = tests

# ---------------------------------------------------------------------------
# Custom markers
# ---------------------------------------------------------------------------
markers =
    unit: Pure unit tests with no external dependencies (Redis, Kafka, etc.)
    integration: Integration tests requiring a running docker-compose stack
    chaos: Chaos / resilience tests requiring a running docker-compose stack

# ---------------------------------------------------------------------------
# Asyncio
# ---------------------------------------------------------------------------
asyncio_mode = auto

# ---------------------------------------------------------------------------
# Output & verbosity
# ---------------------------------------------------------------------------
addopts =
    --strict-markers
    --tb=short
    -q

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_cli = false
log_level = WARNING
